    @keyframes toast-in { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes toast-out { from { transform: translateX(0); opacity: 1; } to { transform: translateX(120%); opacity: 0; } }

<script>
// ============================================================
// 1. THEME SYSTEM
// ============================================================
const THEMES = {

    sidebar: 'bg-[#0d0d14] border-r border-[#1e1e2a]', topbar: 'bg-[#0d0d14]/90 backdrop-blur border-b border-[#1e1e2a]',
    muted: 'text-gray-500', badge: 'bg-[#1e1e2a] text-gray-300 rounded-full', divider: 'border-[#1e1e2a]',
    modal: 'bg-[#13131a] border border-[#1e1e2a] rounded-xl',
    toast: 'bg-[#13131a] border border-[#1e1e2a] text-gray-200 rounded-lg shadow-xl',
    ring: { track: '#1e1e2a', fill: '#00ff88' },
  },
  cartoon: {
    body: 'bg-[#b8f0ff] text-gray-900',
    surface: 'bg-white border-[#222] border-3', surfaceHover: 'hover:bg-blue-50',
    accent: 'text-green-600', accentBg: 'bg-green-500 text-white', accentBorder: 'border-green-500',
    warning: 'text-amber-600', warningBg: 'bg-amber-100 text-amber-700 border-3 border-amber-400',
    danger: 'text-red-500', dangerBorder: 'border-red-500', dangerBg: 'bg-red-100 text-red-600 border-3 border-red-400',
    heading: 'font-cartoon', mono: 'font-mono',
    card: 'bg-white border-3 border-[#222] rounded-2xl shadow-[4px_4px_0_#222]',
    cardHover: 'hover:-translate-y-0.5 hover:shadow-[4px_6px_0_#222]',
    button: 'bg-green-500 text-white font-bold rounded-xl border-3 border-[#222] shadow-[3px_3px_0_#222] hover:-translate-y-0.5 hover:shadow-[3px_5px_0_#222] active:translate-y-0 active:shadow-[1px_1px_0_#222]',
    buttonSecondary: 'bg-purple-100 text-purple-700 font-bold rounded-xl border-3 border-[#222] shadow-[3px_3px_0_#222] hover:-translate-y-0.5',
    buttonDanger: 'bg-red-100 text-red-600 font-bold rounded-xl border-3 border-red-400 shadow-[3px_3px_0_#c44] hover:-translate-y-0.5',
    input: 'bg-white border-3 border-[#222] text-gray-900 rounded-xl focus:border-green-500 focus:ring-2 focus:ring-green-200',
    sidebar: 'bg-[#a0e0ff] border-r-3 border-[#222]', topbar: 'bg-[#a0e0ff] border-b-3 border-[#222]',
    muted: 'text-gray-500', badge: 'bg-purple-100 text-purple-700 rounded-full border-2 border-purple-300 font-cartoon', divider: 'border-[#222]',
    modal: 'bg-white border-3 border-[#222] rounded-2xl shadow-[6px_6px_0_#222]',
    toast: 'bg-white border-3 border-[#222] text-gray-900 rounded-xl shadow-[4px_4px_0_#222]',
    ring: { track: '#e0e0e0', fill: '#22c55e' },
  }
};
function t(key) { return THEMES[AppState.theme][key]; }

// ============================================================
// 2. DEFAULT DATA (v2 schema)
// ============================================================
const DEFAULT_DATA = {
  schemaVersion: 2,
  users: [
    {
      id: 'rik', name: 'Rik', pin: '1234', role: 'admin', avatar: '🔥', active: true,
      roomIds: ['room_default'],
      stats: { totalPoints: 0, streak: 0, lastSessionDate: null, sessionsAttended: 0, goalsCompleted: 0, goalsTotal: 0 },
      currentGoals: { priority: [], secondary: [], notToDo: [] }, sessions: []
    },
    {
      id: 'friend1', name: 'Partner', pin: '5678', role: 'member', avatar: '⚡', active: true,
      roomIds: ['room_default'],
      stats: { totalPoints: 0, streak: 0, lastSessionDate: null, sessionsAttended: 0, goalsCompleted: 0, goalsTotal: 0 },
      currentGoals: { priority: [], secondary: [], notToDo: [] }, sessions: []
    }
  ],
  rooms: [
    {
      id: 'room_default', name: 'Main Room', createdBy: 'rik', createdAt: '2026-04-02',
      inviteCode: 'ACC001',
      memberIds: ['rik', 'friend1'],
      settings: {
        sessionFrequency: 'weekly', publicShame: true,
        shameThresholds: { minCompletion: 0.5, maxViolations: 3, minDeepWorkHours: 0 },
        potEnabled: false, potAmountPerPeriod: 10, potPeriod: 'monthly', potCompletionThreshold: 0.8
      },
      goals: [], notToDos: [], deepWork: [],
      pot: { currentPeriod: '', ledger: [], balances: {} },
      sessions: []
    }
  ],
  sessions: [],
  settings: {
    pointsConfig: { showUp: 10, completeGoal: 25, completeSecondary: 10, maintainNotToDo: 5, peerVoteGood: 15, peerVoteMeh: 7, streakBonus: 5, streakMilestone: 50 },
    githubRepo: '', githubToken: '', anthropicKey: ''
  }
};

// ============================================================
// 3. STATE MANAGEMENT
// ============================================================
const AppState = {
  data: null, currentUser: null, currentRoom: null,
  currentView: 'login', routeParams: {},
  sha: null, storageMode: 'local', syncStatus: 'idle',
  theme: localStorage.getItem('accountability_theme') || 'dark',
};
function setState(updates) { Object.assign(AppState, updates); render(); }

// ============================================================
// 4. HELPERS
// ============================================================
function getUser(id) { return AppState.data?.users.find(u => u.id === id); }
function getActiveUsers() { return (AppState.data?.users || []).filter(u => u.active !== false); }
function getRoom(id) { return AppState.data?.rooms?.find(r => r.id === id); }
function getUserRooms(userId) { return (AppState.data?.rooms || []).filter(r => r.memberIds.includes(userId)); }
function getRoomMembers(roomId) { const r = getRoom(roomId); return r ? r.memberIds.map(id => getUser(id)).filter(Boolean) : []; }
function getRoomGoals(roomId, opts = {}) {
  const room = getRoom(roomId); if (!room) return [];
  return room.goals.filter(g => {
    if (opts.userId && g.userId !== opts.userId) return false;
    if (opts.timeframe && g.timeframe !== opts.timeframe) return false;
    if (opts.period && g.period !== opts.period) return false;
    if (opts.type && g.type !== opts.type) return false;
    return true;
  });
}
function getVisibleGoals(roomId, viewerId) {
  const room = getRoom(roomId); if (!room) return [];
  return room.goals.filter(g => g.userId === viewerId || g.visibility === 'public');
}
function generateId(prefix) { return `${prefix}_${Date.now()}_${Math.random().toString(36).slice(2, 6)}`; }
function generateInviteCode() { return Math.random().toString(36).substring(2, 8).toUpperCase(); }
function getCurrentPeriod(timeframe) {
  const now = new Date();
  if (timeframe === 'weekly') {
    const d = new Date(now); d.setDate(d.getDate() + 3 - ((d.getDay() + 6) % 7));
    const week1 = new Date(d.getFullYear(), 0, 4);
    const weekNum = 1 + Math.round(((d - week1) / 86400000 - 3 + ((week1.getDay() + 6) % 7)) / 7);
    return `${d.getFullYear()}-W${String(weekNum).padStart(2, '0')}`;
  }
  if (timeframe === 'monthly') return now.toISOString().slice(0, 7);
  return `${now.getFullYear()}-Q${Math.ceil((now.getMonth() + 1) / 3)}`;
}
function debounce(fn, ms = 300) { let timer; return (...args) => { clearTimeout(timer); timer = setTimeout(() => fn(...args), ms); }; }

// ============================================================
// 5. SCHEMA MIGRATION (v1 → v2)
// ============================================================
function migrateData(data) {
  if (data.schemaVersion >= 2) return data;
  console.log('Migrating data from v1 to v2...');
  const defaultRoom = {
    id: 'room_default', name: 'Main Room', createdBy: data.users[0]?.id || 'admin',
    createdAt: new Date().toISOString().split('T')[0],
    inviteCode: generateInviteCode(),
    memberIds: data.users.filter(u => u.active !== false).map(u => u.id),
    settings: {
      sessionFrequency: data.settings?.sessionFrequency || 'weekly',
      publicShame: data.settings?.publicShame ?? true,
      shameThresholds: { minCompletion: 0.5, maxViolations: 3, minDeepWorkHours: 0 },
      potEnabled: false, potAmountPerPeriod: 10, potPeriod: 'monthly', potCompletionThreshold: 0.8
    },
    goals: [], notToDos: [], deepWork: [],
    pot: { currentPeriod: '', ledger: [], balances: {} },
    sessions: (data.sessions || []).map(s => s.id)
  };
  const period = getCurrentPeriod('weekly');
  data.users.forEach(user => {
    if (!user.roomIds) user.roomIds = ['room_default'];
    const cg = user.currentGoals || {};
    ['priority', 'secondary'].forEach(type => {
      (cg[type] || []).forEach(g => {
        defaultRoom.goals.push({
          id: generateId('goal'), userId: user.id, roomId: 'room_default', text: g.text,
          type, timeframe: 'weekly', parentGoalId: null, deadline: g.deadline || null,
          completed: g.completed || false, completedAt: null, visibility: 'public',
          createdAt: new Date().toISOString().split('T')[0], period, outcome: null
        });
      });
    });
    (cg.notToDo || []).forEach(n => {
      defaultRoom.notToDos.push({
        id: generateId('ntd'), userId: user.id, text: n.text,
        visibility: 'public', violations: [], period
      });
    });
  });
  (data.sessions || []).forEach(s => { if (!s.roomId) s.roomId = 'room_default'; });
  data.rooms = [defaultRoom];
  data.schemaVersion = 2;
  return data;
}

// ============================================================
// 6. GITHUB API
// ============================================================
async function githubRead(settings) {
  const { githubRepo, githubToken } = settings;
  if (!githubRepo || !githubToken) throw new Error('GitHub not configured');
  const [owner, repo] = githubRepo.split('/');
  const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/data.json`, {
    headers: { 'Authorization': `token ${githubToken}`, 'Accept': 'application/vnd.github.v3+json' }
  });
  if (!res.ok) throw new Error(`GitHub read failed: ${res.status}`);
  const json = await res.json();
  AppState.sha = json.sha;
  return JSON.parse(atob(json.content.replace(/\n/g, '')));
}
async function githubWrite(settings, data, retried = false) {
  const { githubRepo, githubToken } = settings;
  if (!githubRepo || !githubToken) throw new Error('GitHub not configured');
  const [owner, repo] = githubRepo.split('/');
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));
  const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/data.json`, {
    method: 'PUT',
    headers: { 'Authorization': `token ${githubToken}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
    body: JSON.stringify({ message: `Update: ${new Date().toISOString().split('T')[0]}`, content, sha: AppState.sha })
  });
  if (res.status === 409 && !retried) { await githubRead(settings); return githubWrite(settings, data, true); }
  if (!res.ok) throw new Error(`GitHub write failed: ${res.status}`);
  const json = await res.json(); AppState.sha = json.content.sha; return json;
}

// ============================================================
// 7. DATA LAYER
// ============================================================
function localStorageRead() { const r = localStorage.getItem('accountability_data'); return r ? JSON.parse(r) : null; }
function localStorageWrite(data) { localStorage.setItem('accountability_data', JSON.stringify(data)); }

async function loadData() {
  const settings = localStorageRead()?.settings || DEFAULT_DATA.settings;
  if (settings.githubRepo && settings.githubToken) {
    try {
      let data = await githubRead(settings);
      data = migrateData(data);
      AppState.data = data; AppState.storageMode = 'github'; AppState.syncStatus = 'synced';
      localStorageWrite(data); return;
    } catch (e) { console.warn('GitHub read failed:', e.message); }
  }
  const local = localStorageRead();
  if (local) {
    AppState.data = migrateData(local); AppState.storageMode = 'local';
    AppState.syncStatus = settings.githubRepo ? 'offline' : 'idle'; return;
  }
  AppState.data = JSON.parse(JSON.stringify(DEFAULT_DATA));
  AppState.storageMode = 'local'; AppState.syncStatus = 'idle'; localStorageWrite(AppState.data);
}

let saveTimeout = null;
function saveData() {
  localStorageWrite(AppState.data);
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(async () => {
    const { githubRepo, githubToken } = AppState.data.settings;
    if (githubRepo && githubToken) {
      try { AppState.syncStatus = 'saving'; renderTopbar(); await githubWrite(AppState.data.settings, AppState.data); AppState.syncStatus = 'synced'; }
      catch (e) { console.error('GitHub write failed:', e.message); AppState.syncStatus = 'error'; }
      renderTopbar();
    }
  }, 500);
}

// ============================================================
// 8. ROUTER
// ============================================================
function parseRoute(hash) {
  const parts = hash.split('/');
  if (parts[0] === 'room' && parts[1]) {
    return { view: parts[2] || 'room-dashboard', roomId: parts[1] };
  }
  return { view: hash || 'login', roomId: null };
}

function navigate(path) {
  location.hash = path;
  const route = parseRoute(path);
  AppState.currentView = route.view;
  if (route.roomId) AppState.currentRoom = route.roomId;
  else if (!['room-dashboard','goals','pot'].includes(route.view)) AppState.currentRoom = null;
  render();
}

window.addEventListener('hashchange', () => {
  const hash = location.hash.slice(1) || 'login';
  const route = parseRoute(hash);
  AppState.currentView = route.view;
  if (route.roomId) AppState.currentRoom = route.roomId;
  else if (!['room-dashboard','goals','pot'].includes(route.view)) AppState.currentRoom = null;
  render();
});

function logout() { AppState.currentUser = null; AppState.currentRoom = null; navigate('login'); }

// ============================================================
// 9. COMPONENTS
// ============================================================
function progressRing(percent, size = 80) {
  const colors = t('ring'); const stroke = 6; const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r; const offset = c - (percent / 100) * c; const cx = size / 2;
  return `<svg width="${size}" height="${size}" class="block">
    <circle cx="${cx}" cy="${cx}" r="${r}" stroke="${colors.track}" stroke-width="${stroke}" fill="none"/>
    <circle cx="${cx}" cy="${cx}" r="${r}" stroke="${colors.fill}" stroke-width="${stroke}" fill="none" stroke-linecap="round" class="progress-ring-circle" stroke-dasharray="${c}" stroke-dashoffset="${offset}"/>
    <text x="${cx}" y="${cx}" text-anchor="middle" dominant-baseline="central" class="${t('mono')} ${t('accent')}" font-size="${size*0.22}" fill="currentColor">${Math.round(percent)}%</text>
  </svg>`;
}

function toast(message, type = 'success') {
  const container = document.getElementById('toasts');
  const colors = { success: 'border-l-4 border-l-green-500', error: 'border-l-4 border-l-red-500', info: 'border-l-4 border-l-blue-500' };
  const el = document.createElement('div');
  el.className = `${t('toast')} ${colors[type] || ''} px-4 py-3 animate-toast-in min-w-[250px]`;
  el.textContent = message; container.appendChild(el);
  setTimeout(() => { el.classList.add('animate-toast-out'); el.addEventListener('animationend', () => el.remove()); }, 3000);
}

function showModal(html) {
  const modal = document.getElementById('modal'), content = document.getElementById('modal-content');
  content.className = `relative z-10 w-full max-w-xl mx-4 max-h-[85vh] overflow-y-auto animate-slide-up ${t('modal')} max-md:max-w-none max-md:mx-0 max-md:max-h-full max-md:h-full max-md:rounded-none`;
  content.innerHTML = html; modal.classList.remove('hidden'); modal.classList.add('flex');
}
function hideModal() { const m = document.getElementById('modal'); m.classList.add('hidden'); m.classList.remove('flex'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') hideModal(); });
document.getElementById('modal-backdrop')?.addEventListener('click', hideModal);

function goalCard(goal, roomId, opts = {}) {
  const isOverdue = goal.deadline && new Date(goal.deadline) < new Date() && !goal.completed;
  const isPriority = goal.type === 'priority';
  const borderClass = isOverdue ? t('dangerBorder') + ' border-l-4' : '';
  const visIcon = goal.visibility === 'anonymous' ? '👁️‍🗨️' : '';
  const tfBadge = { weekly: 'W', monthly: 'M', quarterly: 'Q' }[goal.timeframe] || '';
  return `
    <div class="${t('card')} ${isPriority ? 'p-4' : 'p-3'} ${borderClass} flex items-start gap-3 ${t('cardHover')} theme-transition ${goal.completed ? 'opacity-60' : ''}">
      <label class="flex items-center cursor-pointer mt-0.5">
        <input type="checkbox" class="hidden" ${goal.completed ? 'checked' : ''} onchange="toggleRoomGoal('${roomId}','${goal.id}')">
        <div class="w-5 h-5 rounded border-2 ${goal.completed ? t('accentBg') : t('accentBorder')} flex items-center justify-center transition-all">
          ${goal.completed ? '<svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>' : ''}
        </div>
      </label>
      <div class="flex-1 min-w-0">
        <div class="${isPriority ? 'font-semibold' : 'text-sm'} ${goal.completed ? 'line-through' : ''}">
          ${goal.text} ${visIcon}

          </div>

        </div>

function showPinInput(userId) {
  pinUserId = userId; const user = getUser(userId);
  document.getElementById('user-select').classList.add('hidden');
  document.getElementById('pin-section').classList.remove('hidden');
  document.getElementById('pin-avatar').textContent = user.avatar;
  document.getElementById('pin-name').textContent = user.name;
  document.getElementById('pin-error').classList.add('hidden');
  const inputs = document.querySelectorAll('[data-pin]'); inputs.forEach(i => i.value = ''); inputs[0]?.focus();
}
function cancelPin() { pinUserId = null; document.getElementById('user-select').classList.remove('hidden'); document.getElementById('pin-section').classList.add('hidden'); }
function pinAdvance(el, index) {
  if (el.value.length === 1 && index < 3) document.querySelector(`[data-pin="${index+1}"]`)?.focus();
  const pin = Array.from(document.querySelectorAll('[data-pin]')).map(i => i.value).join('');
  if (pin.length === 4) validatePin(pin);
}
function pinKeydown(event, index) { if (event.key === 'Backspace' && !event.target.value && index > 0) document.querySelector(`[data-pin="${index-1}"]`)?.focus(); }
function validatePin(pin) {
  const user = getUser(pinUserId); if (!user) return;
  if (user.pin === pin) {
    AppState.currentUser = user;
    const rooms = getUserRooms(user.id);
    if (rooms.length === 1) { AppState.currentRoom = rooms[0].id; navigate(`room/${rooms[0].id}`); }
    else navigate('rooms');
  } else {
    const s = document.getElementById('pin-section');
    document.getElementById('pin-error').classList.remove('hidden');
    s.classList.add('animate-shake'); setTimeout(() => s.classList.remove('animate-shake'), 400);
    document.querySelectorAll('[data-pin]').forEach(i => i.value = '');
    document.querySelector('[data-pin="0"]')?.focus();
  }
}

function toggleRoomGoal(roomId, goalId) {
  const room = getRoom(roomId); if (!room) return;
  const goal = room.goals.find(g => g.id === goalId); if (!goal) return;
  goal.completed = !goal.completed;
  goal.completedAt = goal.completed ? new Date().toISOString() : null;
  syncUserCurrentGoals(goal.userId, roomId);
  recalculatePoints(goal.userId);
  saveData(); render();
}

function syncUserCurrentGoals(userId, roomId) {
  const user = getUser(userId); if (!user) return;
  const goals = getRoomGoals(roomId, { userId, period: getCurrentPeriod('weekly') });
  user.currentGoals = {
    priority: goals.filter(g => g.type === 'priority'),
    secondary: goals.filter(g => g.type === 'secondary'),
    notToDo: (getRoom(roomId)?.notToDos || []).filter(n => n.userId === userId)

}

async function analyseTranscript(roomId) {
  const apiKey = AppState.data.settings.anthropicKey;
  if (!apiKey) { showError('transcript-error', 'Set your Anthropic API key in Settings first.'); return; }
  const transcript = document.getElementById('transcript-input').value.trim();
  if (!transcript) { showError('transcript-error', 'Paste a transcript first.'); return; }
  const participants = Array.from(document.querySelectorAll('.transcript-participant:checked')).map(el => el.value);
  if (participants.length === 0) { showError('transcript-error', 'Select at least one participant.'); return; }
  const participantNames = participants.map(id => getUser(id)?.name || id).join(', ');
  document.getElementById('analyse-btn').classList.add('hidden');
  document.getElementById('transcript-loading').classList.remove('hidden');
  document.getElementById('transcript-error').classList.add('hidden');

  const systemPrompt = `You are an accountability coach AI. Analyse the following session transcript and extract structured data for each participant.\n\nParticipants: ${participantNames}\n\nFor each participant, extract:\n1. priorityGoals: Top 1-3 goals (specific, actionable)\n2. secondaryGoals: Other goals mentioned\n3. notToDo: Commitments to STOP or AVOID\n4. deadlines: Dates per goal\n5. mood: low/medium/high\n\nReturn ONLY valid JSON:\n{"participants":{"NAME":{"priorityGoals":[{"text":"...","deadline":"YYYY-MM-DD or null"}],"secondaryGoals":[{"text":"...","deadline":null}],"notToDo":[{"text":"..."}],"mood":"low|medium|high"}},"sessionSummary":"2-3 sentence summary"}\n\nTranscript:\n${transcript}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-api-key': apiKey, 'anthropic-version': '2023-06-01', 'anthropic-dangerous-direct-browser-access': 'true' },
      body: JSON.stringify({ model: 'claude-sonnet-4-20250514', max_tokens: 4096, messages: [{ role: 'user', content: systemPrompt }] })
    });
    if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err.error?.message || `API error: ${res.status}`); }
    const data = await res.json();
    const text = data.content?.[0]?.text || '';
    const jsonMatch = text.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('Could not parse JSON from response');
    showTranscriptPreview(JSON.parse(jsonMatch[0]), participants, transcript, roomId);
  } catch (err) {
    document.getElementById('transcript-loading').classList.add('hidden');
    document.getElementById('analyse-btn').classList.remove('hidden');
    showError('transcript-error', err.message);
  }
}

function saveSession(roomId, analysisB64, participants, transcriptB64) {
  const analysis = JSON.parse(decodeURIComponent(escape(atob(analysisB64))));
  const transcript = decodeURIComponent(escape(atob(transcriptB64)));
  const today = new Date().toISOString().split('T')[0];
  const sessionId = `session_${today}_${Date.now()}`;
  const room = getRoom(roomId);
  const nameToId = {}; participants.forEach(id => { const u = getUser(id); if (u) nameToId[u.name] = id; });
  const sessionAnalysis = {};
  const period = getCurrentPeriod('weekly');

  for (const [name, data] of Object.entries(analysis.participants || {})) {
    const userId = nameToId[name] || name.toLowerCase();
    const priorityGoals = (data.priorityGoals || []).map((g, i) => {
      const textEl = document.querySelector(`[data-preview="${userId}-priority-${i}-text"]`);
      const deadlineEl = document.querySelector(`[data-preview="${userId}-priority-${i}-deadline"]`);
      const visEl = document.querySelector(`[data-preview="${userId}-priority-${i}-vis"]`);
      const goal = { id: generateId('goal'), userId, roomId, text: textEl?.value || g.text, type: 'priority', timeframe: 'weekly', parentGoalId: null, deadline: deadlineEl?.value || g.deadline || null, completed: false, completedAt: null, visibility: visEl?.value || 'public', createdAt: today, period, outcome: null };
      room.goals.push(goal);
      return goal;
    });
    const secondaryGoals = (data.secondaryGoals || []).map((g, i) => {
      const textEl = document.querySelector(`[data-preview="${userId}-secondary-${i}-text"]`);
      const goal = { id: generateId('goal'), userId, roomId, text: textEl?.value || g.text, type: 'secondary', timeframe: 'weekly', parentGoalId: null, deadline: null, completed: false, completedAt: null, visibility: 'public', createdAt: today, period, outcome: null };
      room.goals.push(goal);
      return goal;
    });
    (data.notToDo || []).forEach((g, i) => {
      const textEl = document.querySelector(`[data-preview="${userId}-notToDo-${i}-text"]`);
      room.notToDos.push({ id: generateId('ntd'), userId, text: textEl?.value || g.text, visibility: 'public', violations: [], period });
    });
    sessionAnalysis[userId] = { priorityGoals, secondaryGoals, notToDo: data.notToDo || [], mood: data.mood || 'medium', pointsAwarded: AppState.data.settings.pointsConfig.showUp };
    const user = getUser(userId);
    if (user) {
      user.stats.sessionsAttended = (user.stats.sessionsAttended || 0) + 1;
      user.stats.lastSessionDate = today;
      if (!user.sessions) user.sessions = [];
      user.sessions.push(sessionId);
      syncUserCurrentGoals(userId, roomId);
    }
  }

  const session = { id: sessionId, date: today, roomId, participants, transcript: transcript.substring(0, 10000), analysis: sessionAnalysis, sessionSummary: analysis.sessionSummary || '' };
  AppState.data.sessions.push(session);
  room.sessions.push(sessionId);
  participants.forEach(id => recalculatePoints(id));
  saveData(); hideModal(); render(); toast('Session saved! Goals updated.');
}

// 17. GAMIFICATION
// ============================================================
function recalculatePoints(userId) {
  const user = getUser(userId); if (!user) return;
  const config = AppState.data.settings.pointsConfig;
  let total = 0;
  total += (user.stats.sessionsAttended || 0) * config.showUp;
  // Points from all rooms
  getUserRooms(userId).forEach(room => {
    const goals = getRoomGoals(room.id, { userId });
    total += goals.filter(g => g.completed && g.type === 'priority').length * config.completeGoal;
    total += goals.filter(g => g.completed && g.type === 'secondary').length * config.completeSecondary;
  });
  const streak = calculateStreak(userId);
  user.stats.streak = streak;
  total += streak * config.streakBonus;
  [5, 10, 20].forEach(m => { if (streak >= m) total += config.streakMilestone; });
  // Peer votes from sessions
  (AppState.data.sessions || []).forEach(s => {
    const votes = s.analysis?.[userId]?.peerVotes || [];
    votes.forEach(v => { if (v.vote === 'good') total += config.peerVoteGood; else if (v.vote === 'meh') total += config.peerVoteMeh; });
  });
  user.stats.totalPoints = total;
}

function calculateStreak(userId) {
  const sessions = (AppState.data.sessions || []).filter(s => s.participants?.includes(userId)).sort((a, b) => b.date.localeCompare(a.date));
  if (sessions.length === 0) return 0;
  let streak = 0, expected = new Date();
  for (const session of sessions) {
    const d = new Date(session.date);
    const diff = Math.floor((expected - d) / 86400000);
    if (diff > 10) break; // generous grace
    streak++;
    expected = new Date(d); expected.setDate(expected.getDate() - 7);
  }
  return streak;
}

function renderRoomLeaderboard() {
  const room = getRoom(AppState.currentRoom); if (!room) return navigate('rooms');
  const members = getRoomMembers(room.id).map(m => {
    const goals = getRoomGoals(room.id, { userId: m.id });
    const completed = goals.filter(g => g.completed).length;
    const total = goals.length;
    const points = completed * AppState.data.settings.pointsConfig.completeGoal + (m.stats?.sessionsAttended || 0) * AppState.data.settings.pointsConfig.showUp;
    const violations = (room.notToDos || []).filter(n => n.userId === m.id).reduce((s, n) => s + n.violations.length, 0);
    const deepWorkHrs = (room.deepWork || []).filter(d => d.userId === m.id).reduce((s, d) => s + d.hours, 0);
    const completionRate = total > 0 ? completed / total : 0;
    return { ...m, roomPoints: points, completed, total, completionRate, violations, deepWorkHrs };
  }).sort((a, b) => b.roomPoints - a.roomPoints);

  const shame = room.settings.publicShame;
  const thresholds = room.settings.shameThresholds || {};

  document.getElementById('app').innerHTML = `
    <div class="max-w-2xl mx-auto animate-fade-in-up">
      <h1 class="${t('heading')} text-2xl font-bold mb-6 text-center">🏆 ${room.name} Leaderboard</h1>
      <div class="space-y-3">
        ${members.map((m, i) => {
          const isFirst = i === 0;
          const labels = [];
          if (shame) {
            if (m.completionRate < (thresholds.minCompletion || 0.5) && m.total > 0) labels.push({ text: 'Slipping', class: t('dangerBg') });
            if (m.violations >= (thresholds.maxViolations || 3)) labels.push({ text: 'Undisciplined', class: t('dangerBg') });
            if (thresholds.minDeepWorkHours > 0 && m.deepWorkHrs < thresholds.minDeepWorkHours) labels.push({ text: 'Ghost', class: t('warningBg') });
            if (room.settings.potEnabled) {
              const deposited = room.pot?.ledger?.some(e => e.userId === m.id && e.type === 'deposit' && e.period === room.pot?.currentPeriod);
              if (!deposited) labels.push({ text: 'Freeloader', class: t('warningBg') });
            }
          }
          return `
            <div class="${t('card')} p-4 flex items-center gap-4 animate-fade-in-up ${isFirst ? t('accentBorder') + ' border-2' : ''}" style="animation-delay:${i*0.1}s">
              <div class="${t('mono')} text-2xl font-bold w-10 text-center ${isFirst ? t('accent') : t('muted')}">${isFirst ? '👑' : `#${i+1}`}</div>
              <span class="text-3xl">${m.avatar}</span>
              <div class="flex-1">
                <div class="${t('heading')} font-bold">${m.name}</div>
                <div class="flex items-center gap-2 text-xs ${t('muted')} ${t('mono')} flex-wrap">
                  <span>✅ ${m.completed}/${m.total}</span>
                  <span>🔥 ${m.stats?.streak || 0}</span>
                  <span>⏱️ ${m.deepWorkHrs.toFixed(1)}h</span>
                  ${labels.map(l => `<span class="${l.class} text-xs px-2 py-0.5 rounded-full font-bold">${l.text}</span>`).join('')}
                </div>
              </div>
              <div class="${t('accent')} ${t('mono')} text-xl font-bold">${m.roomPoints}</div>
            </div>`;
        }).join('')}
      </div>
    </div>`;
}

  const room = getRoom(roomId);
  const period = room.pot.currentPeriod || getCurrentPeriod(room.settings.potPeriod || 'monthly');
  room.pot.currentPeriod = period;
  room.pot.ledger.push({
    id: generateId('tx'), userId: AppState.currentUser.id, type: 'deposit',
    amount: room.settings.potAmountPerPeriod, date: new Date().toISOString().split('T')[0],
    period, note: 'Monthly deposit'
  });
  saveData(); render(); toast('Deposit confirmed!');
}

function settlePot(roomId) {
  const room = getRoom(roomId);
  const period = room.pot.currentPeriod;
  const deposits = room.pot.ledger.filter(e => e.period === period && e.type === 'deposit');
  const totalPot = deposits.reduce((s, e) => s + e.amount, 0);
  const threshold = room.settings.potCompletionThreshold || 0.8;
  const completers = room.memberIds.filter(uid => {
    const goals = getRoomGoals(room.id, { userId: uid, type: 'priority' });
    const completed = goals.filter(g => g.completed).length;
    return goals.length > 0 && (completed / goals.length) >= threshold;
  });
  const payoutEach = completers.length > 0 ? Math.round(totalPot / completers.length * 100) / 100 : 0;
  const today = new Date().toISOString().split('T')[0];
  room.memberIds.forEach(uid => {
    const isCompleter = completers.includes(uid);
    room.pot.ledger.push({
      id: generateId('tx'), userId: uid, type: 'payout',
      amount: isCompleter ? payoutEach : 0, date: today, period,
      note: isCompleter ? `Won: split of $${totalPot} among ${completers.length}` : 'Did not meet goal threshold'
    });
  });
  saveData(); render(); toast(`Pot settled! $${totalPot} split among ${completers.length} completers.`);
}

function saveRoomSettings(roomId) {
  const room = getRoom(roomId);
  room.name = document.getElementById('rs-name').value.trim() || room.name;
  room.settings.sessionFrequency = document.getElementById('rs-freq').value;
  room.settings.publicShame = document.getElementById('rs-shame').checked;
  room.settings.shameThresholds.minCompletion = parseInt(document.getElementById('rs-min-completion').value) / 100;
  room.settings.potEnabled = document.getElementById('rs-pot').checked;
  room.settings.potAmountPerPeriod = parseInt(document.getElementById('rs-pot-amount').value) || 10;
  room.settings.potPeriod = document.getElementById('rs-pot-period').value;
  room.settings.potCompletionThreshold = parseInt(document.getElementById('rs-pot-threshold').value) / 100;
  saveData(); render(); toast('Room settings saved!');
}

function regenerateInvite(roomId) {
  const room = getRoom(roomId); room.inviteCode = generateInviteCode();
  saveData(); render(); toast(`New invite code: ${room.inviteCode}`);
}
function removeMember(roomId, userId) {
  if (!confirm(`Remove ${getUser(userId)?.name}?`)) return;
  const room = getRoom(roomId); room.memberIds = room.memberIds.filter(id => id !== userId);
  const user = getUser(userId); if (user) user.roomIds = (user.roomIds || []).filter(id => id !== roomId);
  saveData(); render(); toast('Member removed');
}
function leaveRoom(roomId) {
  if (!confirm('Leave this room?')) return;
  const room = getRoom(roomId); room.memberIds = room.memberIds.filter(id => id !== AppState.currentUser.id);
  AppState.currentUser.roomIds = (AppState.currentUser.roomIds || []).filter(id => id !== roomId);
  AppState.currentRoom = null; saveData(); navigate('rooms'); toast('Left the room');
}

  const s = AppState.data.settings;
  s.anthropicKey = document.getElementById('setting-anthropicKey').value.trim();
  s.githubRepo = document.getElementById('setting-githubRepo').value.trim();
  s.githubToken = document.getElementById('setting-githubToken').value.trim();
  Object.keys(s.pointsConfig).forEach(k => { const el = document.getElementById(`setting-points-${k}`); if (el) s.pointsConfig[k] = parseInt(el.value) || 0; });
  saveData(); toast('Settings saved!');
}
function addUser() {
  const name = document.getElementById('new-user-name').value.trim();
  const pin = document.getElementById('new-user-pin').value.trim();
  const avatar = document.getElementById('new-user-avatar').value.trim() || '👤';
  const role = document.getElementById('new-user-role').value;
  if (!name || !pin || pin.length !== 4 || !/^\d{4}$/.test(pin)) { toast('Name + 4-digit PIN required', 'error'); return; }
  const id = name.toLowerCase().replace(/[^a-z0-9]/g, '');
  if (getUser(id)) { toast('User already exists', 'error'); return; }
  AppState.data.users.push({ id, name, pin, role, avatar, active: true, roomIds: [], stats: { totalPoints: 0, streak: 0, lastSessionDate: null, sessionsAttended: 0, goalsCompleted: 0, goalsTotal: 0 }, currentGoals: { priority: [], secondary: [], notToDo: [] }, sessions: [] });

function removeUser(id) {

function renderDashboard() {
  const user = AppState.currentUser; if (!user) return navigate('login');
  const rooms = getUserRooms(user.id);
  const allGoals = rooms.flatMap(r => getRoomGoals(r.id, { userId: user.id }));
  const weekGoals = allGoals.filter(g => g.timeframe === 'weekly' && g.period === getCurrentPeriod('weekly'));
  const completed = weekGoals.filter(g => g.completed).length;
  const total = weekGoals.length;
  const pct = total > 0 ? (completed / total) * 100 : 0;

  document.getElementById('app').innerHTML = `
    <div class="max-w-4xl mx-auto animate-fade-in-up">
      <div class="flex items-center gap-4 mb-6">
        <span class="text-4xl">${user.avatar}</span>
        <div>
          <h1 class="${t('heading')} text-2xl font-bold">${user.name}</h1>
          <div class="${t('muted')} text-sm ${t('mono')}">
            🔥 ${user.stats?.streak || 0} streak · ${user.stats?.totalPoints || 0} pts · ${rooms.length} rooms
          </div>
        </div>
        <div class="ml-auto">${progressRing(pct, 72)}</div>
      </div>

      <h2 class="${t('heading')} font-bold mb-3">Your Rooms</h2>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
        ${rooms.map(room => {
          const rGoals = getRoomGoals(room.id, { userId: user.id, timeframe: 'weekly', period: getCurrentPeriod('weekly') });
          const rCompleted = rGoals.filter(g => g.completed).length;
          return `
            <button onclick="navigate('room/${room.id}')" class="${t('card')} ${t('cardHover')} p-4 text-left cursor-pointer w-full">
              <div class="flex items-center justify-between">
                <h3 class="${t('heading')} font-bold">${room.name}</h3>
                ${progressRing(rGoals.length > 0 ? (rCompleted / rGoals.length) * 100 : 0, 40)}
              </div>
              <div class="${t('muted')} text-xs ${t('mono')} mt-1">${rCompleted}/${rGoals.length} weekly goals</div>
            </button>`;
        }).join('')}
      </div>

      <h2 class="${t('heading')} font-bold mb-3">This Week's Goals (all rooms)</h2>
      ${weekGoals.length === 0 ? `<div class="${t('card')} p-6 text-center ${t('muted')}">No goals this week</div>` :
        weekGoals.map(g => {
          const room = getRoom(g.roomId);
          return `<div class="mb-1"><span class="${t('badge')} text-xs px-1.5 py-0.5 mr-1">${room?.name || '?'}</span>${goalCard(g, g.roomId)}</div>`;
        }).join('')}
    </div>`;
}

// ============================================================
// 24. RENDER + SIDEBAR + TOPBAR
// ============================================================
function render() {
  applyTheme(); renderSidebar(); renderTopbar();
  const v = AppState.currentView;
  // Room views
  if (AppState.currentRoom) {
    switch (v) {
      case 'room-dashboard': renderRoomDashboard(); return;
      case 'goals': renderGoalPlanner(); return;
      case 'leaderboard': renderRoomLeaderboard(); return;
      case 'pot': renderPotView(); return;
      case 'settings': renderRoomSettings(); return;
    }
  }
  // Global views
  switch (v) {
    case 'login': renderLogin(); break;
    case 'rooms': renderRoomSelector(); break;
    case 'dashboard': renderDashboard(); break;
    case 'leaderboard': renderLeaderboard(); break;
    case 'settings': renderSettings(); break;
    default: renderLogin();
  }
}

function applyTheme() { document.body.className = `min-h-screen overflow-hidden ${t('body')} theme-transition`; }

function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  const user = AppState.currentUser;
  sidebar.className = `fixed left-0 top-0 bottom-0 w-16 flex flex-col items-center py-4 gap-2 z-30 theme-transition ${t('sidebar')} max-md:top-auto max-md:left-0 max-md:right-0 max-md:bottom-0 max-md:w-full max-md:h-16 max-md:flex-row max-md:justify-around max-md:py-0 max-md:px-4`;
  if (!user || AppState.currentView === 'login') { sidebar.innerHTML = `<div class="text-xl mt-2">🎯</div>`; return; }

  const inRoom = AppState.currentRoom;
  const room = inRoom ? getRoom(inRoom) : null;
  const v = AppState.currentView;

  let items = [];
  if (room) {
    items = [
      { icon: '←', action: `navigate('rooms')`, label: 'All Rooms', active: false },
      { icon: '🏠', action: `navigate('room/${room.id}')`, label: room.name, active: v === 'room-dashboard' },
      { icon: '📋', action: `navigate('room/${room.id}/goals')`, label: 'Goals', active: v === 'goals' },
      { icon: '🏆', action: `navigate('room/${room.id}/leaderboard')`, label: 'Leaderboard', active: v === 'leaderboard' },
    ];
    if (room.settings.potEnabled) items.push({ icon: '💰', action: `navigate('room/${room.id}/pot')`, label: 'Pot', active: v === 'pot' });
    items.push({ icon: '⚙️', action: `navigate('room/${room.id}/settings')`, label: 'Room Settings', active: v === 'settings' });
  } else {
    items = [
      { icon: '🏠', action: `navigate('rooms')`, label: 'Rooms', active: v === 'rooms' },
      { icon: '👤', action: `navigate('dashboard')`, label: 'Dashboard', active: v === 'dashboard' },
      { icon: '🏆', action: `navigate('leaderboard')`, label: 'Global Board', active: v === 'leaderboard' },
      { icon: '⚙️', action: `navigate('settings')`, label: 'Settings', active: v === 'settings' },
    ];
  }

  sidebar.innerHTML = `
    <div class="text-xl mb-4 max-md:hidden">🎯</div>
    ${items.map(item => `
      <button onclick="${item.action}" class="w-10 h-10 rounded-lg flex items-center justify-center text-lg transition-all ${item.active ? t('accentBg') + ' scale-110' : t('surfaceHover')}" title="${item.label}">${item.icon}</button>
    `).join('')}
    <div class="flex-1 max-md:hidden"></div>
    <button onclick="logout()" class="w-10 h-10 rounded-lg flex items-center justify-center text-lg ${t('surfaceHover')}" title="Logout">🚪</button>
  `;
}

function renderTopbar() {
  const topbar = document.getElementById('topbar');
  const user = AppState.currentUser;
  topbar.className = `fixed top-0 left-16 right-0 h-14 flex items-center justify-between px-6 z-20 theme-transition ${t('topbar')} max-md:left-0`;
  if (!user || AppState.currentView === 'login') {
    topbar.innerHTML = `<div class="${t('heading')} font-bold text-lg">Accountability OS</div><button onclick="toggleTheme()" class="w-8 h-8 rounded-lg flex items-center justify-center ${t('surfaceHover')} text-lg">${AppState.theme === 'dark' ? '🌙' : '☀️'}</button>`;
    return;
  }
  const room = AppState.currentRoom ? getRoom(AppState.currentRoom) : null;
  const syncDot = { synced: 'bg-green-500', saving: 'bg-yellow-500 animate-pulse', error: 'bg-red-500', offline: 'bg-gray-500', idle: 'bg-gray-400' }[AppState.syncStatus] || 'bg-gray-400';
  topbar.innerHTML = `
    <div class="flex items-center gap-3">
      <span class="text-xl">${user.avatar}</span>
      <span class="${t('heading')} font-bold">${user.name}</span>
      ${room ? `<span class="${t('badge')} text-xs px-2 py-0.5">${room.name}</span>` : ''}
      <span class="${t('accent')} ${t('mono')} text-sm font-bold">${user.stats?.totalPoints || 0} pts</span>
      <span class="text-sm">🔥 ${user.stats?.streak || 0}</span>
    </div>
    <div class="flex items-center gap-3">
      <div class="flex items-center gap-1.5" title="Sync: ${AppState.syncStatus}"><div class="w-2 h-2 rounded-full ${syncDot}"></div><span class="${t('muted')} text-xs">${AppState.storageMode === 'github' ? 'GitHub' : 'Local'}</span></div>
      <button onclick="toggleTheme()" class="w-8 h-8 rounded-lg flex items-center justify-center ${t('surfaceHover')} text-lg">${AppState.theme === 'dark' ? '🌙' : '☀️'}</button>
    </div>`;
}

function toggleTheme() { AppState.theme = AppState.theme === 'dark' ? 'cartoon' : 'dark'; localStorage.setItem('accountability_theme', AppState.theme); render(); }

// ============================================================
// 25. INIT
// ============================================================
async function init() { await loadData(); render(); }
init();

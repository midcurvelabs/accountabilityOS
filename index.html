<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accountability OS</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      safelist: [
        'bg-[#0a0a0f]', 'bg-[#13131a]', 'bg-[#0d0d14]', 'bg-[#1e1e2a]', 'bg-[#1a1a24]', 'bg-[#252530]',
        'bg-[#b8f0ff]', 'bg-[#a0e0ff]',
        'text-[#00ff88]', 'text-[#ffaa00]', 'text-[#ff3b3b]',
        'border-[#00ff88]', 'border-[#1e1e2a]', 'border-[#222]', 'border-[#333]', 'border-[#ff3b3b]',
        'border-[#0a0a0f]', 'border-[#ffaa00]',
        'hover:bg-[#1a1a24]', 'hover:bg-[#252530]',
        'hover:border-[#00ff88]/30', 'hover:shadow-[0_0_20px_rgba(0,255,136,0.05)]',
        'shadow-[4px_4px_0_#222]', 'shadow-[4px_6px_0_#222]', 'shadow-[3px_3px_0_#222]', 'shadow-[3px_5px_0_#222]',
        'shadow-[1px_1px_0_#222]', 'shadow-[6px_6px_0_#222]', 'shadow-[3px_3px_0_#c44]',
        'bg-[#00ff88]', 'bg-[#ff3b3b]/10', 'bg-[#ffaa00]/10', 'bg-[#ff3b3b]/20', 'border-[#ff3b3b]/30', 'border-[#ffaa00]/30',
        'focus:border-[#00ff88]', 'focus:ring-[#00ff88]/30',
        'bg-[#0d0d14]/90', 'border-r-3', 'border-b-3',
        'border-l-4', 'border-2', 'border-3',
      ],
      theme: {
        extend: {
          fontFamily: {
            heading: ['Syne', 'sans-serif'],
            mono: ['Space Mono', 'monospace'],
            cartoon: ['Fredoka', 'sans-serif'],
          },
          borderWidth: { '3': '3px' }
        }
      }
    }
  </script>

  <style>
    @keyframes shake { 0%, 100% { transform: translateX(0); } 20%, 60% { transform: translateX(-6px); } 40%, 80% { transform: translateX(6px); } }
    @keyframes slide-up { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
    @keyframes fade-in-up { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes toast-in { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    @keyframes toast-out { from { transform: translateX(0); opacity: 1; } to { transform: translateX(120%); opacity: 0; } }
    .animate-shake { animation: shake 0.4s ease-in-out; }
    .animate-slide-up { animation: slide-up 0.3s ease-out; }
    .animate-fade-in { animation: fade-in 0.3s ease-out; }
    .animate-fade-in-up { animation: fade-in-up 0.4s ease-out both; }
    .animate-toast-in { animation: toast-in 0.3s ease-out; }
    .animate-toast-out { animation: toast-out 0.3s ease-in forwards; }
    .scanline-bg { background-image: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(255,255,255,0.01) 2px, rgba(255,255,255,0.01) 4px); }
    body, .theme-transition { transition: background-color 0.3s ease, color 0.3s ease, border-color 0.3s ease; }
    .progress-ring-circle { transition: stroke-dashoffset 0.5s ease; transform: rotate(-90deg); transform-origin: 50% 50%; }
    ::-webkit-scrollbar { width: 6px; } ::-webkit-scrollbar-track { background: transparent; } ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
  </style>
</head>

<body class="min-h-screen overflow-hidden">
  <nav id="sidebar" class="fixed left-0 top-0 bottom-0 w-16 flex flex-col items-center py-4 gap-2 z-30 theme-transition max-md:top-auto max-md:left-0 max-md:right-0 max-md:bottom-0 max-md:w-full max-md:h-16 max-md:flex-row max-md:justify-around max-md:py-0 max-md:px-4"></nav>
  <header id="topbar" class="fixed top-0 left-16 right-0 h-14 flex items-center justify-between px-6 z-20 theme-transition max-md:left-0"></header>
  <main id="app" class="ml-16 mt-14 p-6 h-[calc(100vh-3.5rem)] overflow-y-auto max-md:ml-0 max-md:mb-16 max-md:h-[calc(100vh-3.5rem-4rem)]"></main>
  <div id="modal" class="fixed inset-0 z-50 hidden items-center justify-center">
    <div id="modal-backdrop" class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
    <div id="modal-content" class="relative z-10 w-full max-w-xl mx-4 max-h-[85vh] overflow-y-auto animate-slide-up max-md:max-w-none max-md:mx-0 max-md:max-h-full max-md:h-full max-md:rounded-none"></div>
  </div>
  <div id="toasts" class="fixed top-16 right-4 z-50 flex flex-col gap-2"></div>

  <script type="module" src="js/app.js?v=2"></script>
</body>
</html>

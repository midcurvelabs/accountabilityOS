    /* Animations */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-6px); }
      40%, 80% { transform: translateX(6px); }
    }
    @keyframes pulse-ring {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(1.5); opacity: 0; }
    }
    @keyframes slide-up {
      from { transform: translateY(40px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes fade-in-up {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes toast-in {
      from { transform: translateX(120%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

      from { transform: translateX(0); opacity: 1; }

    .animate-slide-up { animation: slide-up 0.3s ease-out; }

// ============================================================
// Section 4: GitHub API
// ============================================================

async function githubRead(settings) {
  const { githubRepo, githubToken } = settings;
  if (!githubRepo || !githubToken) throw new Error('GitHub not configured');

  const [owner, repo] = githubRepo.split('/');
  const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/data.json`, {
    headers: {
      'Authorization': `token ${githubToken}`,
      'Accept': 'application/vnd.github.v3+json'
    }
  });

  if (!res.ok) throw new Error(`GitHub read failed: ${res.status}`);

  const json = await res.json();
  AppState.sha = json.sha;
  const content = atob(json.content.replace(/\n/g, ''));
  return JSON.parse(content);
}

async function githubWrite(settings, data, retried = false) {
  const { githubRepo, githubToken } = settings;
  if (!githubRepo || !githubToken) throw new Error('GitHub not configured');

  const [owner, repo] = githubRepo.split('/');
  const content = btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))));

  const body = {
    message: `Update: ${new Date().toISOString().split('T')[0]}`,
    content,
    sha: AppState.sha
  };

  const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/data.json`, {
    method: 'PUT',
    headers: {
      'Authorization': `token ${githubToken}`,
      'Accept': 'application/vnd.github.v3+json',
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(body)
  });

  if (res.status === 409 && !retried) {
    // Conflict — re-read SHA and retry once
    await githubRead(settings);
    return githubWrite(settings, data, true);
  }

  if (!res.ok) throw new Error(`GitHub write failed: ${res.status}`);

  const json = await res.json();
  AppState.sha = json.content.sha;
  return json;
}

// ============================================================
// Section 5: localStorage API
// ============================================================

function localStorageRead() {
  const raw = localStorage.getItem('accountability_data');
  if (!raw) return null;
  return JSON.parse(raw);
}

function localStorageWrite(data) {
  localStorage.setItem('accountability_data', JSON.stringify(data));
}

// ============================================================
// Section 6: Data Layer
// ============================================================

async function loadData() {
  // Try GitHub first
  const settings = localStorageRead()?.settings || DEFAULT_DATA.settings;
  if (settings.githubRepo && settings.githubToken) {
    try {
      const data = await githubRead(settings);
      AppState.data = data;
      AppState.storageMode = 'github';
      AppState.syncStatus = 'synced';
      localStorageWrite(data); // backup
      return;
    } catch (e) {
      console.warn('GitHub read failed, trying localStorage:', e.message);
    }
  }

  // Try localStorage
  const local = localStorageRead();
  if (local) {
    AppState.data = local;
    AppState.storageMode = 'local';
    AppState.syncStatus = settings.githubRepo ? 'offline' : 'idle';
    return;
  }

  // Default
  AppState.data = JSON.parse(JSON.stringify(DEFAULT_DATA));
  AppState.storageMode = 'local';
  AppState.syncStatus = 'idle';
  localStorageWrite(AppState.data);
}

let saveTimeout = null;
function saveData() {
  // Always save to localStorage immediately
  localStorageWrite(AppState.data);

  // Debounced GitHub write
  clearTimeout(saveTimeout);
  saveTimeout = setTimeout(async () => {
    const { githubRepo, githubToken } = AppState.data.settings;
    if (githubRepo && githubToken) {
      try {
        AppState.syncStatus = 'saving';
        renderTopbar();
        await githubWrite(AppState.data.settings, AppState.data);
        AppState.syncStatus = 'synced';
      } catch (e) {
        console.error('GitHub write failed:', e.message);
        AppState.syncStatus = 'error';
      }
      renderTopbar();
    }
  }, 500);
}

// ============================================================
// Section 7: Router
// ============================================================

function navigate(view) {
  location.hash = view;
  AppState.currentView = view;
  render();
}

window.addEventListener('hashchange', () => {
  const hash = location.hash.slice(1) || 'login';
  if (hash !== AppState.currentView) {
    AppState.currentView = hash;
    render();
  }
});

// ============================================================
// Section 8: Auth
// ============================================================

function logout() {
  AppState.currentUser = null;
  navigate('login');
}

function getUser(id) {
  return AppState.data.users.find(u => u.id === id);
}

function getActiveUsers() {
  return AppState.data.users.filter(u => u.active !== false);
}

// ============================================================
// Section 9: Components
// ============================================================

function progressRing(percent, size = 80, themeKey = null) {
  const colors = themeKey || t('ring');
  const stroke = 6;
  const radius = (size - stroke) / 2;
  const circumference = 2 * Math.PI * radius;
  const offset = circumference - (percent / 100) * circumference;
  const center = size / 2;

  return `
    <svg width="${size}" height="${size}" class="block">
      <circle cx="${center}" cy="${center}" r="${radius}"
        stroke="${colors.track}" stroke-width="${stroke}" fill="none" />
      <circle cx="${center}" cy="${center}" r="${radius}"
        stroke="${colors.fill}" stroke-width="${stroke}" fill="none"
        stroke-linecap="round"
        class="progress-ring-circle"
        stroke-dasharray="${circumference}"
        stroke-dashoffset="${offset}" />
      <text x="${center}" y="${center}" text-anchor="middle" dominant-baseline="central"
        class="${t('mono')} ${t('accent')}" font-size="${size * 0.22}" fill="currentColor">
        ${Math.round(percent)}%
      </text>
    </svg>
  `;
}

function toast(message, type = 'success') {
  const container = document.getElementById('toasts');
  const colors = {
    success: AppState.theme === 'dark' ? 'border-l-4 border-l-[#00ff88]' : 'border-l-4 border-l-green-500',
    error: AppState.theme === 'dark' ? 'border-l-4 border-l-[#ff3b3b]' : 'border-l-4 border-l-red-500',
    info: AppState.theme === 'dark' ? 'border-l-4 border-l-blue-400' : 'border-l-4 border-l-blue-500',
  };
  const el = document.createElement('div');
  el.className = `${t('toast')} ${colors[type] || ''} px-4 py-3 animate-toast-in min-w-[250px]`;
  el.textContent = message;
  container.appendChild(el);
  setTimeout(() => {
    el.classList.remove('animate-toast-in');
    el.classList.add('animate-toast-out');
    el.addEventListener('animationend', () => el.remove());
  }, 3000);
}

function debounce(fn, ms = 300) {
  let timer;
  return (...args) => {
    clearTimeout(timer);
    timer = setTimeout(() => fn(...args), ms);
  };
}

function goalCard(goal, type, index, isPriority) {
  const isOverdue = goal.deadline && new Date(goal.deadline) < new Date() && !goal.completed;
  const borderClass = isOverdue ? t('dangerBorder') + ' border-l-4' : '';
  const sizeClass = isPriority ? 'p-4' : 'p-3';
  const checkId = `goal-${type}-${index}`;

  return `
    <div class="${t('card')} ${sizeClass} ${borderClass} flex items-start gap-3 ${t('cardHover')} theme-transition ${goal.completed ? 'opacity-60' : ''}">
      <label class="flex items-center cursor-pointer mt-0.5">
        <input type="checkbox" class="hidden" id="${checkId}" ${goal.completed ? 'checked' : ''}
          onchange="toggleGoal('${type}', ${index})">
        <div class="w-5 h-5 rounded border-2 ${goal.completed ? t('accentBg') : t('accentBorder')} flex items-center justify-center transition-all">
          ${goal.completed ? '<svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>' : ''}
        </div>
      </label>
      <div class="flex-1 min-w-0">
        <div class="${isPriority ? 'font-semibold' : 'text-sm'} ${goal.completed ? 'line-through' : ''}">${goal.text}</div>
        ${goal.deadline ? `
          <span class="${isOverdue ? t('dangerBg') : t('warningBg')} text-xs px-2 py-0.5 rounded-full mt-1 inline-block ${t('mono')}">
            ${isOverdue ? '⚠ Overdue: ' : '📅 '}${goal.deadline}
          </span>
        ` : ''}
      </div>
    </div>
  `;
}

function toggleGoal(type, index) {
  const user = AppState.currentUser;
  const goal = user.currentGoals[type][index];
  goal.completed = !goal.completed;

  // Recalculate stats
  const allGoals = [...user.currentGoals.priority, ...user.currentGoals.secondary];
  user.stats.goalsCompleted = allGoals.filter(g => g.completed).length;
  user.stats.goalsTotal = allGoals.length;

  // Points
  recalculatePoints(user.id);
  saveData();
  render();
}

function toggleSessionDetail(id) {

}

async function analyseTranscript() {
  const apiKey = AppState.data.settings.anthropicKey;
  if (!apiKey) {
    showError('transcript-error', 'Set your Anthropic API key in Settings first.');
    return;
  }

  const textarea = document.getElementById('transcript-input');
  const transcript = textarea.value.trim();
  if (!transcript) {
    showError('transcript-error', 'Paste a transcript first.');
    return;
  }

  const participants = Array.from(document.querySelectorAll('.transcript-participant:checked')).map(el => el.value);
  if (participants.length === 0) {
    showError('transcript-error', 'Select at least one participant.');
    return;
  }

  const participantNames = participants.map(id => getUser(id)?.name || id).join(', ');

  // Show loading
  document.getElementById('analyse-btn').classList.add('hidden');
  document.getElementById('transcript-loading').classList.remove('hidden');
  document.getElementById('transcript-error').classList.add('hidden');

  const systemPrompt = `You are an accountability coach AI. Analyse the following session transcript and extract structured data for each participant.

Participants in this session: ${participantNames}

For each participant, extract:
1. priorityGoals: Their top 1-3 goals for the next period (specific, actionable)
2. secondaryGoals: Other goals or intentions mentioned
3. notToDo: Explicit commitments to STOP doing or AVOID
4. deadlines: Any specific dates or timeframes mentioned per goal
5. mood: Overall energy/mood inferred from transcript (low/medium/high)

Return ONLY valid JSON in this exact structure, no other text:
{
  "participants": {
    "NAME": {
      "priorityGoals": [{ "text": "...", "deadline": "YYYY-MM-DD or null" }],
      "secondaryGoals": [{ "text": "...", "deadline": null }],
      "notToDo": [{ "text": "..." }],
      "mood": "low|medium|high"
    }
  },
  "sessionSummary": "2-3 sentence summary of the session themes"
}

Use the exact participant names provided above as keys in the JSON.

Transcript:
${transcript}`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4096,
        messages: [{ role: 'user', content: systemPrompt }]
      })
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error?.message || `API error: ${res.status}`);
    }

    const data = await res.json();
    const text = data.content?.[0]?.text || '';

    // Extract JSON from response
    const jsonMatch = text.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('Could not parse JSON from response');

    const analysis = JSON.parse(jsonMatch[0]);
    showTranscriptPreview(analysis, participants, transcript);

  } catch (err) {
    document.getElementById('transcript-loading').classList.add('hidden');
    document.getElementById('analyse-btn').classList.remove('hidden');
    showError('transcript-error', err.message);
  }
}

function showTranscriptPreview(analysis, participants, transcript) {

  loading.classList.add('hidden');
  results.classList.remove('hidden');

  });

  }

  const participantData = analysis.participants || {};
  for (const [name, data] of Object.entries(participantData)) {
    const userId = nameToId[name] || name.toLowerCase();
    const user = getUser(userId);
    const moodEmoji = { low: '😔', medium: '😐', high: '🔥' };

    html += `
      <div class="${t('card')} p-4 mb-3">
        <div class="flex items-center gap-2 mb-3">
          <span class="text-xl">${user?.avatar || '❓'}</span>
          <span class="${t('heading')} font-bold">${name}</span>
          <span class="${t('badge')} text-xs px-2 py-0.5">${moodEmoji[data.mood] || '😐'} ${data.mood || 'medium'}</span>
        </div>

        <div class="space-y-2">
          <div class="text-xs font-bold ${t('accent')}">🎯 Priority Goals</div>
          ${(data.priorityGoals || []).map((g, i) => `
            <div class="flex items-center gap-2">
              <input type="text" value="${g.text}" class="${t('input')} text-xs px-2 py-1 flex-1" data-preview="${userId}-priority-${i}-text">
              <input type="text" value="${g.deadline || ''}" placeholder="YYYY-MM-DD" class="${t('input')} text-xs px-2 py-1 w-28" data-preview="${userId}-priority-${i}-deadline">
            </div>
          `).join('')}

          <div class="text-xs font-bold mt-2">📝 Secondary Goals</div>
          ${(data.secondaryGoals || []).map((g, i) => `
            <input type="text" value="${g.text}" class="${t('input')} text-xs px-2 py-1 w-full" data-preview="${userId}-secondary-${i}-text">
          `).join('')}

          <div class="text-xs font-bold mt-2 ${t('danger')}">🚫 NOT-to-do</div>
          ${(data.notToDo || []).map((g, i) => `
            <input type="text" value="${g.text}" class="${t('input')} text-xs px-2 py-1 w-full" data-preview="${userId}-notToDo-${i}-text">
          `).join('')}
        </div>
      </div>
    `;
  }

  html += `
    <button class="${t('button')} w-full py-3 text-sm mt-4" onclick="saveSession(${JSON.stringify(participants).replace(/"/g, '&quot;')}, ${JSON.stringify(JSON.stringify(analysis)).slice(1, -1).replace(/"/g, '&quot;')}, '${btoa(unescape(encodeURIComponent(transcript.substring(0, 5000))))}')">
      ✅ Confirm & Save Session
    </button>
  `;

  results.innerHTML = html;
}

function saveSession(participants, analysisJson, transcriptB64) {
  const analysis = JSON.parse(analysisJson);
  const transcript = decodeURIComponent(escape(atob(transcriptB64)));
  const today = new Date().toISOString().split('T')[0];
  const sessionId = `session_${today}_${Date.now()}`;

  // Read edited values from preview inputs
  const nameToId = {};
  participants.forEach(id => {
    const user = getUser(id);
    if (user) nameToId[user.name] = id;
  });

  const sessionAnalysis = {};
  const participantData = analysis.participants || {};

  for (const [name, data] of Object.entries(participantData)) {
    const userId = nameToId[name] || name.toLowerCase();

    // Read edited values
    const priorityGoals = (data.priorityGoals || []).map((g, i) => {
      const textEl = document.querySelector(`[data-preview="${userId}-priority-${i}-text"]`);
      const deadlineEl = document.querySelector(`[data-preview="${userId}-priority-${i}-deadline"]`);
      return {
        text: textEl?.value || g.text,
        deadline: deadlineEl?.value || g.deadline || null,
        completed: false
      };
    });
    const secondaryGoals = (data.secondaryGoals || []).map((g, i) => {
      const textEl = document.querySelector(`[data-preview="${userId}-secondary-${i}-text"]`);
      return { text: textEl?.value || g.text, deadline: null, completed: false };
    });
    const notToDo = (data.notToDo || []).map((g, i) => {
      const textEl = document.querySelector(`[data-preview="${userId}-notToDo-${i}-text"]`);
      return { text: textEl?.value || g.text };
    });

    sessionAnalysis[userId] = {
      priorityGoals,
      secondaryGoals,
      notToDo,
      mood: data.mood || 'medium',
      pointsAwarded: AppState.data.settings.pointsConfig.showUp
    };

    // Update user's current goals
    const user = getUser(userId);
    if (user) {
      user.currentGoals = {
        priority: priorityGoals,
        secondary: secondaryGoals,
        notToDo: notToDo
      };
      user.stats.sessionsAttended = (user.stats.sessionsAttended || 0) + 1;
      user.stats.lastSessionDate = today;
      user.stats.goalsTotal = priorityGoals.length + secondaryGoals.length;
      user.stats.goalsCompleted = 0;
      if (!user.sessions) user.sessions = [];
      user.sessions.push(sessionId);
    }
  }

  // Create session object
  const session = {
    id: sessionId,
    date: today,
    participants,
    transcript: transcript.substring(0, 10000),
    analysis: sessionAnalysis,
    sessionSummary: analysis.sessionSummary || ''
  };

  AppState.data.sessions.push(session);

  // Award points + recalculate
  participants.forEach(id => recalculatePoints(id));

  saveData();
  hideModal();
  render();
  toast('Session saved! Goals updated for all participants.');
}

function showError(elementId, message) {
  const el = document.getElementById(elementId);
  if (el) {
    el.textContent = message;
    el.classList.remove('hidden');
  }
}

function recalculatePoints(userId) {
  const user = getUser(userId);
  if (!user) return;

  const config = AppState.data.settings.pointsConfig;
  let total = 0;

  // Session attendance points
  total += (user.stats.sessionsAttended || 0) * config.showUp;

  // Goal completion points
  const priority = user.currentGoals?.priority || [];
  const secondary = user.currentGoals?.secondary || [];
  total += priority.filter(g => g.completed).length * config.completeGoal;
  total += secondary.filter(g => g.completed).length * config.completeSecondary;

  // Check all sessions for historical goal completions
  // (simplified — counts current goals only for v1)

  // Streak calculation
  const streak = calculateStreak(userId);
  user.stats.streak = streak;
  total += streak * config.streakBonus;

  // Streak milestones
  [5, 10, 20].forEach(milestone => {
    if (streak >= milestone) total += config.streakMilestone;
  });

  // Peer votes from sessions
  (AppState.data.sessions || []).forEach(s => {
    const votes = s.analysis?.[userId]?.peerVotes || [];
    votes.forEach(v => {
      if (v.vote === 'good') total += config.peerVoteGood;
      else if (v.vote === 'meh') total += config.peerVoteMeh;
    });
  });

  user.stats.totalPoints = total;
  user.stats.goalsCompleted = [...priority, ...secondary].filter(g => g.completed).length;
  user.stats.goalsTotal = priority.length + secondary.length;
}

function calculateStreak(userId) {
  const user = getUser(userId);
  if (!user) return 0;

  const sessions = (AppState.data.sessions || [])
    .filter(s => s.participants?.includes(userId))
    .sort((a, b) => b.date.localeCompare(a.date));

  if (sessions.length === 0) return 0;

  const freq = AppState.data.settings.sessionFrequency === 'biweekly' ? 14 : 7;
  let streak = 0;
  let expectedDate = new Date();

  for (const session of sessions) {
    const sessionDate = new Date(session.date);
    const diffDays = Math.floor((expectedDate - sessionDate) / (1000 * 60 * 60 * 24));

    if (diffDays > freq + 3) break; // allow 3 day grace period

    // Check if at least 1 priority goal was completed for this session
    const analysis = session.analysis?.[userId];
    const hadGoalComplete = analysis?.priorityGoals?.some(g => g.completed);

    if (hadGoalComplete !== false) { // count if goals were completed OR if it's a new session with no completions yet
      streak++;
    }

    expectedDate = new Date(sessionDate);
    expectedDate.setDate(expectedDate.getDate() - freq);
  }

  return streak;
}

function formatPointKey(key) {
  return key.replace(/([A-Z])/g, ' $1').replace(/^./, s => s.toUpperCase());
}

function saveSettings() {
  const s = AppState.data.settings;
  s.anthropicKey = document.getElementById('setting-anthropicKey').value.trim();
  s.githubRepo = document.getElementById('setting-githubRepo').value.trim();
  s.githubToken = document.getElementById('setting-githubToken').value.trim();
  s.sessionFrequency = document.getElementById('setting-frequency').value;
  s.publicShame = document.getElementById('setting-shame').checked;

  Object.keys(s.pointsConfig).forEach(key => {
    const el = document.getElementById(`setting-points-${key}`);
    if (el) s.pointsConfig[key] = parseInt(el.value) || 0;
  });

  saveData();
  toast('Settings saved!');
}

function addUser() {
  const name = document.getElementById('new-user-name').value.trim();
  const pin = document.getElementById('new-user-pin').value.trim();
  const avatar = document.getElementById('new-user-avatar').value.trim() || '👤';
  const role = document.getElementById('new-user-role').value;

  if (!name || !pin || pin.length !== 4 || !/^\d{4}$/.test(pin)) {
    toast('Enter a name and 4-digit PIN', 'error');
    return;
  }

  const id = name.toLowerCase().replace(/[^a-z0-9]/g, '');
  if (getUser(id)) {
    toast('User already exists', 'error');
    return;
  }

  AppState.data.users.push({
    id, name, pin, role, avatar,
    active: true,
    stats: { totalPoints: 0, streak: 0, lastSessionDate: null, sessionsAttended: 0, goalsCompleted: 0, goalsTotal: 0 },
    currentGoals: { priority: [], secondary: [], notToDo: [] },
    sessions: []
  });

  saveData();
  render();
  toast(`${avatar} ${name} added!`);
}

function removeUser(id) {
  const user = getUser(id);
  if (!user) return;
  if (!confirm(`Remove ${user.name}? Their history will be kept.`)) return;
  user.active = false;
  saveData();
  render();
  toast(`${user.name} removed`);
}

function showPeerVoteModal(sessionId) {
  const session = AppState.data.sessions.find(s => s.id === sessionId);
  if (!session || !AppState.currentUser) return;

  const otherParticipants = session.participants.filter(id => id !== AppState.currentUser.id);

  showModal(`
    <div class="p-6">
      <h2 class="${t('heading')} text-xl font-bold mb-4">Rate Your Partners</h2>
      <div class="space-y-4">
        ${otherParticipants.map(id => {
          const user = getUser(id);
          return `
            <div class="${t('card')} p-4">
              <div class="flex items-center gap-2 mb-3">
                <span class="text-2xl">${user?.avatar || '?'}</span>
                <span class="${t('heading')} font-bold">${user?.name || id}</span>
              </div>
              <div class="flex gap-2">
                <button class="${t('buttonDanger')} flex-1 py-2" onclick="castVote('${sessionId}', '${id}', 'bad')">👎</button>
                <button class="${t('buttonSecondary')} flex-1 py-2" onclick="castVote('${sessionId}', '${id}', 'meh')">😐</button>
                <button class="${t('button')} flex-1 py-2" onclick="castVote('${sessionId}', '${id}', 'good')">👍</button>
              </div>
            </div>
          `;
        }).join('')}
      </div>
    </div>
  `);
}

function castVote(sessionId, targetId, vote) {
  const session = AppState.data.sessions.find(s => s.id === sessionId);
  if (!session?.analysis?.[targetId]) return;

  if (!session.analysis[targetId].peerVotes) session.analysis[targetId].peerVotes = [];
  session.analysis[targetId].peerVotes.push({
    from: AppState.currentUser.id,
    vote
  });

  recalculatePoints(targetId);
  saveData();
  hideModal();
  toast('Vote recorded!');
}

  const modal = document.getElementById('modal');

  content.className = `relative z-10 w-full max-w-xl mx-4 max-h-[85vh] overflow-y-auto animate-slide-up ${t('modal')} max-md:max-w-none max-md:mx-0 max-md:max-h-full max-md:h-full max-md:rounded-none`;
  content.innerHTML = html;
  modal.classList.remove('hidden');
  modal.classList.add('flex');
}

function hideModal() {
  const modal = document.getElementById('modal');
  modal.classList.add('hidden');
  modal.classList.remove('flex');
}

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') hideModal();
});

document.getElementById('modal-backdrop')?.addEventListener('click', hideModal);

// Section 18: Render + Topbar + Sidebar
// ============================================================

function render() {
  applyTheme();
  renderSidebar();
  renderTopbar();

  switch (AppState.currentView) {
    case 'login': renderLogin(); break;
    case 'dashboard': renderDashboard(); break;
    case 'admin': renderAdmin(); break;
    case 'leaderboard': renderLeaderboard(); break;
    case 'settings': renderSettings(); break;
    default: renderLogin();
  }
}

function applyTheme() {
  const body = document.body;
  // Remove all theme classes first
  body.className = `min-h-screen overflow-hidden ${t('body')} theme-transition`;
}

function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  const user = AppState.currentUser;
  const isAdmin = user?.role === 'admin';
  const view = AppState.currentView;

  sidebar.className = `fixed left-0 top-0 bottom-0 w-16 flex flex-col items-center py-4 gap-2 z-30 theme-transition ${t('sidebar')} max-md:top-auto max-md:left-0 max-md:right-0 max-md:bottom-0 max-md:w-full max-md:h-16 max-md:flex-row max-md:justify-around max-md:py-0 max-md:px-4`;

  if (!user || AppState.currentView === 'login') {
    sidebar.innerHTML = `<div class="text-xl mt-2">🎯</div>`;
    return;
  }

  const navItems = [
    { icon: '📊', view: isAdmin ? 'admin' : 'dashboard', label: isAdmin ? 'Admin' : 'Dashboard' },
    { icon: '🏆', view: 'leaderboard', label: 'Leaderboard' },
    { icon: '⚙️', view: 'settings', label: 'Settings' },
  ];

  sidebar.innerHTML = `
    <div class="text-xl mb-4 max-md:hidden">🎯</div>
    ${navItems.map(item => `
      <button onclick="navigate('${item.view}')"
        class="w-10 h-10 rounded-lg flex items-center justify-center text-lg transition-all
          ${view === item.view ? t('accentBg') + ' scale-110' : t('surfaceHover')}"
        title="${item.label}">
        ${item.icon}
      </button>
    `).join('')}
    ${isAdmin ? `
      <div class="flex-1 max-md:hidden"></div>
      <button onclick="navigate('dashboard')"
        class="w-10 h-10 rounded-lg flex items-center justify-center text-lg transition-all ${view === 'dashboard' ? t('accentBg') + ' scale-110' : t('surfaceHover')}"
        title="My Dashboard">
        👤
      </button>
    ` : ''}
    <div class="flex-1 max-md:hidden"></div>
    <button onclick="logout()"
      class="w-10 h-10 rounded-lg flex items-center justify-center text-lg ${t('surfaceHover')}"
      title="Logout">
      🚪
    </button>
  `;
}

function renderTopbar() {
  const topbar = document.getElementById('topbar');
  const user = AppState.currentUser;

  topbar.className = `fixed top-0 left-16 right-0 h-14 flex items-center justify-between px-6 z-20 theme-transition ${t('topbar')} max-md:left-0`;

  if (!user || AppState.currentView === 'login') {
    topbar.innerHTML = `
      <div class="${t('heading')} font-bold text-lg">Accountability OS</div>
      <button onclick="toggleTheme()" class="w-8 h-8 rounded-lg flex items-center justify-center ${t('surfaceHover')} text-lg">
        ${AppState.theme === 'dark' ? '🌙' : '☀️'}
      </button>
    `;
    return;
  }

  const syncDot = {
    synced: 'bg-green-500',
    saving: 'bg-yellow-500 animate-pulse',
    error: 'bg-red-500',
    offline: 'bg-gray-500',
    idle: 'bg-gray-400'
  }[AppState.syncStatus] || 'bg-gray-400';

  topbar.innerHTML = `
    <div class="flex items-center gap-3">
      <span class="text-xl">${user.avatar}</span>
      <span class="${t('heading')} font-bold">${user.name}</span>
      <span class="${t('accent')} ${t('mono')} text-sm font-bold">${user.stats?.totalPoints || 0} pts</span>
      <span class="text-sm">🔥 ${user.stats?.streak || 0}</span>
    </div>
    <div class="flex items-center gap-3">
      <div class="flex items-center gap-1.5" title="Sync: ${AppState.syncStatus}">
        <div class="w-2 h-2 rounded-full ${syncDot}"></div>
        <span class="${t('muted')} text-xs">${AppState.storageMode === 'github' ? 'GitHub' : 'Local'}</span>
      </div>
      <button onclick="toggleTheme()" class="w-8 h-8 rounded-lg flex items-center justify-center ${t('surfaceHover')} text-lg">
        ${AppState.theme === 'dark' ? '🌙' : '☀️'}
      </button>

  `;
}

function toggleTheme() {
  AppState.theme = AppState.theme === 'dark' ? 'cartoon' : 'dark';
  localStorage.setItem('accountability_theme', AppState.theme);
  render();
}

function renderLogin() {
  const users = getActiveUsers();
  const app = document.getElementById('app');

  app.innerHTML = `
    <div class="flex items-center justify-center min-h-[calc(100vh-7rem)]">

        <div class="flex flex-wrap justify-center gap-4" id="user-select">
          ${users.map(user => `
            <button onclick="showPinInput('${user.id}')"
              class="${t('card')} ${t('cardHover')} p-6 w-36 flex flex-col items-center gap-3 transition-all cursor-pointer">
              <span class="text-5xl">${user.avatar}</span>

          <div class="flex items-center justify-center gap-2 mb-4">

            <input type="password" maxlength="1" class="${t('input')} pin-input w-12 h-14 text-center text-xl font-bold" data-pin="0" oninput="pinAdvance(this, 0)" onkeydown="pinKeydown(event, 0)">
            <input type="password" maxlength="1" class="${t('input')} pin-input w-12 h-14 text-center text-xl font-bold" data-pin="1" oninput="pinAdvance(this, 1)" onkeydown="pinKeydown(event, 1)">
            <input type="password" maxlength="1" class="${t('input')} pin-input w-12 h-14 text-center text-xl font-bold" data-pin="2" oninput="pinAdvance(this, 2)" onkeydown="pinKeydown(event, 2)">
            <input type="password" maxlength="1" class="${t('input')} pin-input w-12 h-14 text-center text-xl font-bold" data-pin="3" oninput="pinAdvance(this, 3)" onkeydown="pinKeydown(event, 3)">
          </div>
          <div id="pin-error" class="hidden ${t('danger')} text-sm mb-2">Wrong PIN. Try again.</div>

let pinUserId = null;

function showPinInput(userId) {
  pinUserId = userId;
  const user = getUser(userId);
  document.getElementById('user-select').classList.add('hidden');
  document.getElementById('pin-section').classList.remove('hidden');
  document.getElementById('pin-avatar').textContent = user.avatar;
  document.getElementById('pin-name').textContent = user.name;
  document.getElementById('pin-error').classList.add('hidden');

  // Clear and focus first input
  const inputs = document.querySelectorAll('[data-pin]');
  inputs.forEach(i => i.value = '');
  inputs[0]?.focus();
}

function cancelPin() {
  pinUserId = null;
  document.getElementById('user-select').classList.remove('hidden');
  document.getElementById('pin-section').classList.add('hidden');
}

function pinAdvance(el, index) {
  if (el.value.length === 1 && index < 3) {
    document.querySelector(`[data-pin="${index + 1}"]`)?.focus();
  }
  // Check if all filled
  const inputs = document.querySelectorAll('[data-pin]');
  const pin = Array.from(inputs).map(i => i.value).join('');
  if (pin.length === 4) {
    validatePin(pin);
  }
}

function pinKeydown(event, index) {
  if (event.key === 'Backspace' && !event.target.value && index > 0) {
    document.querySelector(`[data-pin="${index - 1}"]`)?.focus();
  }
}

function validatePin(pin) {
  const user = getUser(pinUserId);
  if (!user) return;

  if (user.pin === pin) {
    AppState.currentUser = user;
    navigate(user.role === 'admin' ? 'admin' : 'dashboard');
  } else {
    const pinSection = document.getElementById('pin-section');
    document.getElementById('pin-error').classList.remove('hidden');
    pinSection.classList.add('animate-shake');
    setTimeout(() => pinSection.classList.remove('animate-shake'), 400);
    const inputs = document.querySelectorAll('[data-pin]');
    inputs.forEach(i => i.value = '');
    inputs[0]?.focus();
  }
}

// ============================================================

async function init() {
  await loadData();
  render();
}

init();
